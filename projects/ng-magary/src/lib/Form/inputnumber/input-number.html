<!-- ============================================
     HTML Template - InputNumber Component
     ============================================ -->

<span
  class="magary-inputnumber"
  [class]="{
    'magary-inputnumber-buttons-stacked':
      showButtons() && buttonLayout() === 'stacked',
    'magary-inputnumber-buttons-horizontal':
      showButtons() && buttonLayout() === 'horizontal',
    'magary-inputnumber-focused': focused(),
    'magary-disabled': isDisabled(),
  }"
  [style]="style()"
  [attr.data-mode]="buttonLayout()"
>
  <input
    #input
    type="text"
    [attr.id]="resolvedInputId()"
    [attr.name]="name()"
    [attr.placeholder]="placeholder()"
    [attr.size]="size()"
    [attr.maxlength]="maxlength()"
    [attr.tabindex]="tabindex()"
    [attr.aria-invalid]="isInvalid() ? 'true' : null"
    [attr.aria-describedby]="describedBy()"
    [disabled]="isDisabled()"
    [readonly]="readonly()"
    [value]="formattedValue()"
    (input)="onUserInput($event)"
    (focus)="onInputFocus($event)"
    (blur)="onInputBlur($event)"
    (keydown)="onInputKeyDown($event)"
    class="magary-inputnumber-input"
    [class]="inputStyleClass()"
    [style]="inputStyle()"
  />

  <!-- Stacked Layout: Botones verticales dentro del input -->
  @if (showButtons() && buttonLayout() === "stacked") {
    <span class="magary-inputnumber-button-group">
      <button
        type="button"
        class="magary-inputnumber-button magary-inputnumber-button-up"
        [class]="incrementButtonClass()"
        [disabled]="isDisabled() || (max() !== null && value()! >= max()!)"
        (click)="spin($event, 1)"
        tabindex="-1"
      >
        <i-lucide
          [name]="incrementButtonIcon() || 'chevron-up'"
          class="magary-icon"
        ></i-lucide>
      </button>
      <button
        type="button"
        class="magary-inputnumber-button magary-inputnumber-button-down"
        [class]="decrementButtonClass()"
        [disabled]="isDisabled() || (min() !== null && value()! <= min()!)"
        (click)="spin($event, -1)"
        tabindex="-1"
      >
        <i-lucide
          [name]="decrementButtonIcon() || 'chevron-down'"
          class="magary-icon"
        ></i-lucide>
      </button>
    </span>
  }

  <!-- Horizontal Layout: Botones a los lados del input -->
  @if (showButtons() && buttonLayout() === "horizontal") {
    <!-- Botón Decrementar (Izquierda) -->
    <button
      type="button"
      class="magary-inputnumber-button magary-inputnumber-button-down"
      [class]="decrementButtonClass()"
      [disabled]="isDisabled() || (min() !== null && value()! <= min()!)"
      (click)="spin($event, -1)"
      tabindex="-1"
    >
      <i-lucide
        [name]="decrementButtonIcon() || 'minus'"
        class="magary-icon"
      ></i-lucide>
    </button>

    <!-- Botón Incrementar (Derecha) -->
    <button
      type="button"
      class="magary-inputnumber-button magary-inputnumber-button-up"
      [class]="incrementButtonClass()"
      [disabled]="isDisabled() || (max() !== null && value()! >= max()!)"
      (click)="spin($event, 1)"
      tabindex="-1"
    >
      <i-lucide
        [name]="incrementButtonIcon() || 'plus'"
        class="magary-icon"
      ></i-lucide>
    </button>
  }
</span>

@if (hasVisibleErrorMessage() || helpText()) {
  <div class="magary-inputnumber-message">
    @if (hasVisibleErrorMessage()) {
      <span class="error-message" [id]="errorMessageId" role="alert">
        {{ errorMessage() }}
      </span>
    } @else if (helpText()) {
      <span class="help-message" [id]="helpMessageId">{{ helpText() }}</span>
    }
  </div>
}
