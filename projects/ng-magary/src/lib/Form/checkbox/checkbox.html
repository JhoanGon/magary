<div [class]="containerClasses()">
  <label [for]="uniqueId" class="checkbox-wrapper">
    <input
      type="checkbox"
      [id]="uniqueId"
      [checked]="checked()"
      [disabled]="isDisabled()"
      [required]="required()"
      [attr.aria-invalid]="isInvalid() ? 'true' : null"
      [attr.aria-describedby]="describedBy()"
      (change)="onChange($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      class="hidden-input"
    />
    <div class="custom-checkbox">
      <svg class="checkmark" viewBox="0 0 24 24">
        <path
          class="checkmark-path"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          d="M5 12l5 5L19 7"
        />
      </svg>
    </div>
    @if (label()) {
      <span class="checkbox-label">{{ label() }}</span>
    }
  </label>

  @if (hasVisibleErrorMessage() || helpText()) {
    <div class="checkbox-message">
      @if (hasVisibleErrorMessage()) {
        <span class="error-message" [id]="errorMessageId" role="alert">
          {{ errorMessage() }}
        </span>
      } @else if (helpText()) {
        <span class="help-message" [id]="helpMessageId">{{ helpText() }}</span>
      }
    </div>
  }
</div>
