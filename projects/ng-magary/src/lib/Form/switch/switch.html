<div [class]="containerClasses()">
  <label [for]="uniqueId" class="switch-wrapper">
    <input
      type="checkbox"
      [id]="uniqueId"
      [checked]="checked()"
      [disabled]="isDisabled()"
      [attr.aria-invalid]="isInvalid() ? 'true' : null"
      [attr.aria-describedby]="describedBy()"
      (change)="onChange($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      class="hidden-input"
      role="switch"
      [attr.aria-checked]="checked()"
    />
    <div class="switch-track">
      <div class="switch-handle">
        <div class="handle-shadow"></div>
      </div>
    </div>
    @if (label()) {
      <span class="switch-label">{{ label() }}</span>
    }
  </label>

  @if (hasVisibleErrorMessage() || helpText()) {
    <div class="switch-message">
      @if (hasVisibleErrorMessage()) {
        <span class="error-message" [id]="errorMessageId" role="alert">
          {{ errorMessage() }}
        </span>
      } @else if (helpText()) {
        <span class="help-message" [id]="helpMessageId">{{ helpText() }}</span>
      }
    </div>
  }
</div>
